{% extends "header.html" %} {% block title %}eLearning Guide{% endblock %} {%
block content %}
<div class="container mt-2 staff-page">  <h2 class="mb-4 text-center staff-page-title">
  eLearning Guide
</h2>
  <div class="row">
    <!-- Small Left Column -->
    <div class="col-12 col-md-4 mb-4">

      <!-- Results Card -->
      <div class="card staff-card shadow-sm mb-3">
<div class="card-header staff-modal-header text-center fw-bold">          My eLearning Results
        </div>
        <div class="card-body">
          <div class="row row-cols-1 g-2">
            {% for course in courses %}
            <div class="col">
              <div
  class="d-flex justify-content-between align-items-center border rounded p-2 staff-elearning-item"
>
                <div class="flex-grow-1 pe-3">
                  <small>{{ course.Course }}</small>
                </div>
                <span
  class="badge course-badge
  {% if course.Status == 'Passed' %}
    badge-status-passed
  {% elif course.Status == 'In Progress' %}
    badge-status-progress
  {% elif course.Status == 'Cancelled' %}
    badge-status-cancelled
  {% else %}
    badge-status-not-started
  {% endif %}"
>
  {{ course.Status }}
</span>
              </div>
            </div>
            {% endfor %}
          </div>
        </div>
      </div>
<div class="d-flex flex-column flex-md-row gap-2 mb-3 action-row">        <a
          href="{{ url_for('static', filename='eLearningGuide.pdf') }}"
          class="btn staff-action-btn w-100"
          download
        >
          Download PDF Instructions
        </a>
        <a
          href="https://sporttutor.nz/ilp/pages/catalogsearch.jsf?catalogId=3712496&menuId=3712463&locale=en-GB&showbundlekeys=false&client=watersafetynz&sidebarExpanded=true&q=*:*&rows=9"
          class="btn staff-action-btn w-100"
          target="_blank"
        >
          Search SportTutor Courses
        </a>
      </div>
    </div>
    <div class="col-12 col-md-8 d-flex justify-content-center">
      <div class="card shadow-sm staff-card w-100" style="max-width: 650px">
        <img
          src="{{ url_for('static', filename='eLearningGuide.jpg') }}"
          alt="eLearning Guide Preview "
          class="img-fluid rounded-top"
        />
      </div>
    </div>
  </div>
</div>

{% endblock %}
