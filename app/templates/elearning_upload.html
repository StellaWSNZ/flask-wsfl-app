{% extends "header.html" %}
{% block title %}E-Learning Upload{% endblock %}

{% block content %}
<div class="container form-page mt-5">
  <div class="row justify-content-center">
    <div class="col-lg-6">

      <div class="text-center mb-4">
        <h2 class="form-title mb-2">
          Upload E-Learning Excel
        </h2>

        <p class="form-subtitle">
          A place for WSNZ admins to upload the Sport Tutor report
        </p>
      </div>

      <div class="form-section">
        <form method="POST" enctype="multipart/form-data">

          <div class="form-question">
            <label for="csv_file" class="form-question-title">
              Choose an Excel file (.xlsx)
            </label>

            <input
              class="form-control"
              type="file"
              name="csv_file"
              id="csv_file"
              accept=".xlsx"
              required
            />
          </div>

          <button type="submit" class="btn btn-accent">
            Upload
          </button>

        </form>
      </div>

    </div>
  </div>
</div>
{% endblock %}
