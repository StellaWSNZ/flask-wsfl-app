<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" />

    <title>Login</title>

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/custom.css') }}"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      .login-bg {
        min-height: 100vh;
        background-color: #163968;
        background-image: url("/static/background-login.svg");
        background-size: cover;
        background-position: bottom center;
        background-repeat: no-repeat;
      }

      .logo-top-left {
        position: absolute;
        top: 20px;
        left: 20px;
        width: 120px;
        height: auto;
      }

      .login-card {
        width: min(380px, 92vw);
        border-radius: 16px !important;
        padding: clamp(16px, 3.5vw, 28px) !important;
        background-color: rgba(248, 252, 252, 0.94) !important;
        backdrop-filter: blur(6px);
        border: 1px solid rgba(255, 255, 255, 0.45);
        box-shadow: 0 1rem 2.5rem rgba(0, 0, 0, 0.22) !important;
      }

      .login-card h4 {
        color: #163968;
        font-weight: 700;
      }

      .login-card .form-control {
        border-radius: 10px;
        padding: 0.7rem 0.85rem;
      }

      .login-card .form-control:focus {
        border-color: #163968;
        box-shadow: 0 0 0 0.2rem rgba(26, 66, 125, 0.18);
      }

      .workflow-btn-primary {
        background-color: #163968 !important;
        border-color: #163968 !important;
        color: #ffffff !important;
        font-weight: 600;
      }

      .workflow-btn-primary:hover,
      .workflow-btn-primary:focus {
        background-color: #15345f !important;
        border-color: #15345f !important;
        color: #ffffff !important;
      }

      .login-help-box {
        background-color: rgba(255, 255, 255, 0.72);
        color: #163968;
        border: 1px solid rgba(26, 66, 125, 0.18);
        border-radius: 12px;
      }

      .login-help-btn {
        border: 1px solid #163968 !important;
        color: #163968 !important;
        background: rgba(255, 255, 255, 0.7);
        font-weight: 600;
      }

      .login-help-btn:hover,
      .login-help-btn:focus {
        background: #163968 !important;
        border-color: #163968 !important;
        color: #ffffff !important;
      }

      .alert.small,
      .alert .small {
        font-size: 0.875rem;
      }

      @media (max-width: 575.98px) {
        .logo-top-left {
          width: 95px;
          top: 16px;
          left: 16px;
        }

        .login-card {
          margin: 1rem;
        }
      }
    </style>
  </head>

  <body class="login-bg d-flex justify-content-center align-items-center">
    <img src="/static/LightLogo.png" alt="Logo" class="logo-top-left" />

    <form
      method="POST"
      action="{{ url_for('auth_bp.login') }}"
      class="login-card p-4 rounded shadow"
    >
      <input
        type="hidden"
        name="next"
        value="{{ next or request.args.get('next', '') }}"
      />

      <h4 class="mb-3 text-center">Login</h4>

      {% with messages = get_flashed_messages(with_categories=True) %}
        {% if messages %}
          {% for category, msg in messages %}
            <div
              class="alert alert-{{ category }} alert-dismissible fade show mb-3"
              role="alert"
            >
              {{ msg }}

              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="alert"
                aria-label="Close"
              ></button>
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <div class="mb-3">
        <input
          type="text"
          name="username"
          placeholder="Email"
          class="form-control"
          required
          autofocus
          autocomplete="username"
          inputmode="email"
        />
      </div>

      <div class="mb-3">
        <input
          type="password"
          name="password"
          placeholder="Password"
          class="form-control"
          required
          autocomplete="current-password"
        />
      </div>

      <button
        type="submit"
        class="btn workflow-btn-primary w-100 mb-3"
      >
        Login
      </button>

      <div class="login-help-box py-3 small text-center mb-0">
        <p class="mb-2">
          <strong>Need help logging in?</strong>
        </p>

        <div class="d-flex justify-content-center gap-2 flex-wrap">
          <a
            href="{{ url_for('auth_bp.forgot_password') }}"
            class="btn btn-sm login-help-btn px-3"
          >
            Reset Password
          </a>

          <a
            href="mailto:dbadmin@watersafety.org.nz"
            class="btn btn-sm login-help-btn px-3"
          >
            Email Support
          </a>
        </div>
      </div>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
