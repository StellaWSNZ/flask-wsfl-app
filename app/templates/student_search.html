{% extends "header.html" %} {% block title %}Search Students{% endblock %} {%
block content %}

<div class="container mt-5 student-search-page">
  <h2 class="mb-4 text-center student-search-page-title">Search for a Student</h2>

  <!-- Page Notification area -->
  <div id="notification" class="alert d-none" role="alert"></div>

  <!-- Search + sort -->
  <div class="row mb-3">
    <div class="col-md-6">
      <input
        type="text"
        id="search-input"
        class="form-control"
        placeholder="Type a name..."
        autocomplete="off"
      />
    </div>
    <div class="col-md-4">
      <select id="sort-select" class="form-select">
        <option value="FirstName_asc">Sort by First Name (A-Z)</option>
        <option value="FirstName_desc">Sort by First Name (Z-A)</option>
        <option value="LastName_asc">Sort by Last Name (A-Z)</option>
        <option value="LastName_desc">Sort by Last Name (Z-A)</option>
      </select>
    </div>
  </div>

  <div id="results" class="row g-3"></div>
</div>

<!-- Edit Modal -->
<div
  class="modal fade"
  id="editStudentModal"
  tabindex="-1"
  aria-labelledby="editStudentModalLabel"
  aria-hidden="true"
>
  <div class="modal-dialog">
    <div class="modal-content border-0">
      <div class="modal-header student-search-modal-header">

        <h5 class="modal-title" id="editStudentModalLabel">
          Edit Student
        </h5>
        <button
          type="button"
          class="btn-close btn-close-white"
          data-bs-dismiss="modal"
          aria-label="Close"
        ></button>
      </div>

      <div class="modal-body">
        <!-- Modal Notification area -->
        <div
          id="modal-notification"
          class="alert d-none mb-3"
          role="alert"
        ></div>

        <form id="edit-student-form">
          <input type="hidden" id="edit-nsn" />

          <div class="mb-3">
            <label for="edit-first-name" class="form-label">First Name</label>
            <input
              type="text"
              class="form-control"
              id="edit-first-name"
              required
            />
          </div>

          <div class="mb-3">
            <label for="edit-last-name" class="form-label">Last Name</label>
            <input
              type="text"
              class="form-control"
              id="edit-last-name"
              required
            />
          </div>

          <div class="mb-3">
            <label for="edit-preferred-name" class="form-label"
              >Preferred Name</label
            >
            <input type="text" class="form-control" id="edit-preferred-name" />
          </div>

          <div class="mb-3">
            <label for="edit-ethnicity" class="form-label">Ethnicity</label>
            <select class="form-select" id="edit-ethnicity">
              {% for eth in ethnicities %}
              <option value="{{ eth.id }}">{{ eth.desc }}</option>
              {% endfor %}
            </select>
          </div>

          <button type="submit" class="btn student-search-primary-btn" id="save-btn">
            Save Changes
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  const searchInput = document.getElementById("search-input");
  const resultsList = document.getElementById("results");
  const sortSelect = document.getElementById("sort-select");

  let debounceTimer;
  let latestStudents = [];

  function showNotification(message, type = "success") {
    const notif = document.getElementById("notification");
    notif.className = `alert alert-${type}`;
    notif.textContent = message;
    notif.classList.remove("d-none");
    setTimeout(() => notif.classList.add("d-none"), 3000);
  }

  function showModalNotification(message, type = "success") {
    const notif = document.getElementById("modal-notification");
    notif.className = `alert alert-${type} mb-3`;
    notif.textContent = message;
    notif.classList.remove("d-none");
  }

  function clearModalNotification() {
    const notif = document.getElementById("modal-notification");
    notif.classList.add("d-none");
    notif.textContent = "";
  }

  function escapeHtml(value) {
    return String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function normaliseStudent(student) {
    return {
      ...student,
      NSN: student.NSN ?? "",
      FirstName: student.FirstName ?? "",
      LastName: student.LastName ?? "",
      PreferredName: student.PreferredName ?? "",
      DateOfBirth: student.DateOfBirth ?? "",
      EthnicityID: student.EthnicityID ?? "",
      EthnicityDesc: student.EthnicityDesc ?? "",
      YearLevelID: student.YearLevelID ?? "",
      Term: student.Term ?? "",
      CalendarYear: student.CalendarYear ?? "",
      LatestSchoolName: student.LatestSchoolName ?? "",
    };
  }

  function sortStudents(data, sortOption) {
    const [key, direction] = sortOption.split("_");

    return [...data].sort((a, b) => {
      const av = String(a[key] ?? "").toLowerCase();
      const bv = String(b[key] ?? "").toLowerCase();

      if (av < bv) return direction === "asc" ? -1 : 1;
      if (av > bv) return direction === "asc" ? 1 : -1;
      return 0;
    });
  }

  function renderStudents(data) {
    resultsList.innerHTML = "";

    if (!Array.isArray(data) || data.length === 0) {
      resultsList.innerHTML =
        '<div class="col-12"><div class="alert alert-warning">No students found.</div></div>';
      return;
    }

    const safeData = data.map(normaliseStudent);
    const sorted = sortStudents(safeData, sortSelect.value);

    sorted.forEach((student) => {
      const col = document.createElement("div");
      col.className = "col-md-6 col-lg-4";

      const firstName = escapeHtml(student.FirstName);
      const lastName = escapeHtml(student.LastName);
      const preferredName = escapeHtml(student.PreferredName);
      const dateOfBirth = escapeHtml(student.DateOfBirth);
      const ethnicityDesc = escapeHtml(student.EthnicityDesc);
      const yearLevel = escapeHtml(student.YearLevelID);
      const term = escapeHtml(student.Term);
      const year = escapeHtml(student.CalendarYear);
      const nsn = escapeHtml(student.NSN);
      const latestSchool = escapeHtml(student.LatestSchoolName);
      const ethnicityID = escapeHtml(student.EthnicityID);

      col.innerHTML = `
        <div class="card student-search-card h-100">
          <div class="card-body d-flex flex-column">
            <h5 class="card-title">
              ${firstName} ${lastName}
              ${
                preferredName
                  ? `<small class="text-muted">(${preferredName})</small>`
                  : ""
              }
            </h5>

            <p class="card-text mb-1"><strong>DOB:</strong> ${dateOfBirth}</p>
            <p class="card-text mb-1"><strong>Ethnicity:</strong> ${ethnicityDesc}</p>
            <p class="card-text mb-1">
              <strong>Year Level:</strong> ${yearLevel}
              (Term ${term}, ${year})
            </p>
            <p class="card-text mb-1"><strong>NSN:</strong> ${nsn}</p>
            <p class="card-text mb-1"><strong>Latest School:</strong> ${latestSchool}</p>

            <div class="mt-auto d-flex justify-content-end">
              <button class="btn btn-sm student-search-action-btn edit-btn"
                      data-nsn="${nsn}"
                      data-first="${firstName}"
                      data-last="${lastName}"
                      data-pref="${preferredName}"
                      data-ethnicity="${ethnicityID}">
                ✏️ Edit
              </button>
            </div>
          </div>
        </div>
      `;

      resultsList.appendChild(col);
    });
  }

  async function fetchStudents(query) {
    const response = await fetch(
    `/Students/search?q=${encodeURIComponent(query)}&t=${Date.now()}`
  );

  const text = await response.text();

  console.log("Student search status:", response.status);
  console.log("Student search raw response:", text.slice(0, 500));

  let data;
  try {
    data = JSON.parse(text);
  } catch (err) {
    throw new Error(
      `Search returned non-JSON response. HTTP ${response.status}. First part: ${text.slice(0, 120)}`
    );
  }

  if (!response.ok) {
    throw new Error(data?.error || data?.message || `HTTP ${response.status}`);
  }

  if (!Array.isArray(data)) {
    throw new Error("Student search did not return an array");
  }

  latestStudents = data.map(normaliseStudent);
  renderStudents(latestStudents);

  return latestStudents;
  }

  function populateModalFromStudent(student) {
    const safeStudent = normaliseStudent(student);

    document.getElementById("edit-nsn").value = safeStudent.NSN;
    document.getElementById("edit-first-name").value = safeStudent.FirstName;
    document.getElementById("edit-last-name").value = safeStudent.LastName;
    document.getElementById("edit-preferred-name").value = safeStudent.PreferredName;
    document.getElementById("edit-ethnicity").value = safeStudent.EthnicityID;
  }

  async function reloadModalFromServerByNSN(nsn) {
    const query = searchInput.value.trim();
    if (query.length < 2) return false;

    const data = await fetchStudents(query);

    const updated = Array.isArray(data)
      ? data.find((s) => String(s.NSN) === String(nsn))
      : null;

    if (updated) {
      populateModalFromStudent(updated);
      return true;
    }

    return false;
  }

  searchInput.addEventListener("input", () => {
    clearTimeout(debounceTimer);

    const query = searchInput.value.trim();

    if (query.length < 2) {
      resultsList.innerHTML = "";
      latestStudents = [];
      return;
    }

    debounceTimer = setTimeout(() => {
      fetchStudents(query).catch((err) => {
        console.error("❌ Error fetching students:", err);
        showNotification(`❌ Search failed: ${err.message}`, "danger");
      });
    }, 800);
  });

  sortSelect.addEventListener("change", () => {
    if (latestStudents.length > 0) {
      renderStudents(latestStudents);
      return;
    }

    const query = searchInput.value.trim();

    if (query.length >= 2) {
      fetchStudents(query).catch((err) => {
        console.error("❌ Error fetching students:", err);
        showNotification(`❌ Search failed: ${err.message}`, "danger");
      });
    }
  });

  document.addEventListener("click", function (e) {
    const btn = e.target.closest(".edit-btn");
    if (!btn) return;

    clearModalNotification();

    populateModalFromStudent({
      NSN: btn.dataset.nsn,
      FirstName: btn.dataset.first,
      LastName: btn.dataset.last,
      PreferredName: btn.dataset.pref,
      EthnicityID: btn.dataset.ethnicity,
    });

    const modal = new bootstrap.Modal(
      document.getElementById("editStudentModal")
    );

    modal.show();
  });

  document
    .getElementById("editStudentModal")
    .addEventListener("hidden.bs.modal", () => {
      clearModalNotification();

      const saveBtn = document.getElementById("save-btn");
      saveBtn.disabled = false;
      saveBtn.textContent = "Save Changes";
    });

  document
    .getElementById("edit-student-form")
    .addEventListener("submit", async function (e) {
      e.preventDefault();

      clearModalNotification();

      const saveBtn = document.getElementById("save-btn");
      saveBtn.disabled = true;
      saveBtn.textContent = "Saving changes…";

      const nsn = document.getElementById("edit-nsn").value;

      const payload = {
        NSN: nsn,
        FirstName: document.getElementById("edit-first-name").value,
        LastName: document.getElementById("edit-last-name").value,
        PreferredName: document.getElementById("edit-preferred-name").value,
        EthnicityID: document.getElementById("edit-ethnicity").value,
      };

      try {
        const resp = await fetch("/Students/edit", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        let body;
        const ct = resp.headers.get("content-type") || "";

        if (ct.includes("application/json")) {
          body = await resp.json();
        } else {
          const txt = await resp.text();
          body = {
            success: false,
            message: `Non-JSON response (${resp.status}). ${txt.slice(0, 200)}`,
          };
        }

        if (!resp.ok || !body.success) {
          showModalNotification(
            `❌ Update failed: ${body.message || `HTTP ${resp.status}`}`,
            "danger"
          );

          saveBtn.disabled = false;
          saveBtn.textContent = "Save Changes";
          return;
        }

        const found = await reloadModalFromServerByNSN(nsn);

        showModalNotification(
          found
            ? "✅ Updated successfully"
            : "✅ Updated successfully, but couldn’t re-load the updated row",
          "success"
        );

        saveBtn.disabled = false;
        saveBtn.textContent = "Save Changes";

        showNotification("✅ Student updated!", "success");
      } catch (err) {
        console.error("❌ Error:", err);
        showModalNotification(`❌ Unexpected error: ${err.message}`, "danger");

        saveBtn.disabled = false;
        saveBtn.textContent = "Save Changes";
      }
    });
</script>
{% endblock %}
