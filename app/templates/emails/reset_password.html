<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reset your password</title>
</head>
<body style="margin:0; padding:0; background-color:#f4f6f8; font-family:Arial, Helvetica, sans-serif; color:#333;">
  <div style="max-width:640px; margin:0 auto; padding:24px 16px;">
    <div style="background:#ffffff; border:1px solid #e5e7eb; border-radius:10px; padding:28px 24px;">

      <p style="margin:0 0 20px 0;">
        <img src="cid:wsfl_logo" alt="WSFL Logo" style="max-width:180px; height:auto; display:block;">
      </p>

      <p style="margin:0 0 16px 0; font-size:16px;">Kia ora,</p>

      <p style="margin:0 0 16px 0; font-size:15px; line-height:1.6;">
        We received a request to reset your Water Skills for Life password.
      </p>

      <p style="margin:0 0 20px 0; font-size:15px; line-height:1.6;">
        To choose a new password, use the link below:
      </p>

      <p style="margin:0 0 24px 0;">
        <a href="{{ reset_url }}"
           style="display:inline-block; background:#1a427d; color:#ffffff; text-decoration:none; padding:11px 16px; border-radius:6px; font-weight:600;">
          Reset your password
        </a>
      </p>

      <p style="margin:0 0 20px 0; font-size:15px; line-height:1.6; color:#555;">
        If you did not request this, you can safely ignore this email.
      </p>

      <p style="margin:0; font-size:15px; line-height:1.6;">
        Ngā mihi,<br>
        <strong>Water Skills for Life Administration Team</strong>
      </p>
    </div>
  </div>
</body>
</html>
